<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Battle Plan</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #050714;
      --card: #0d1128;
      --card2: #151b3d;
      --border: #232d66;
      --green: #22ff00;
      --orange: #ff9100;
      --blue: #00e5ff;
      --purple: #e066ff;
      --yellow: #ffee00;
      --red: #ff2a55;
      --text: #ffffff;
      --muted: #aeb8d1;
      --fs-base: 24px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: var(--fs-base);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, #0a0d2b 0%, #151b3d 100%);
      border-bottom: 3px solid var(--green);
      padding: 2rem;
      position: relative;
      z-index: 100;
      box-shadow: 0 10px 40px rgba(34, 255, 0, 0.15);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      color: var(--green);
      text-shadow: 0 0 15px rgba(34, 255, 0, 0.4);
      text-transform: uppercase;
    }

    .header p {
      color: var(--blue);
      font-size: 0.9rem;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    /* ===== PROGRESS BAR ===== */
    .overall-progress {
      margin-top: 1.5rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
    }

    .progress-label span:first-child {
      color: var(--green);
    }

    .progress-label span:last-child {
      color: var(--yellow);
      font-size: 1.2rem;
    }

    .progress-bar-bg {
      background: #1a1f45;
      border-radius: 12px;
      height: 24px;
      overflow: hidden;
      border: 2px solid var(--border);
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 0.5s ease;
    }

    .stats-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid var(--border);
      border-radius: 30px;
      padding: 0.5rem 1.2rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stat-pill span {
      color: var(--green);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .btn-action {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-action:hover {
      transform: scale(1.05);
    }

    /* ===== TABS ===== */
    .tabs-container {
      background: var(--card);
      border-bottom: 3px solid var(--border);
      padding: 0 2rem;
      overflow-x: auto;
      position: sticky;
      top: 0;
      z-index: 90;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      min-width: max-content;
    }

    .tab-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 1.2rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      border-bottom: 4px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .tab-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
      background: rgba(34, 255, 0, 0.1);
    }

    .tab-progress {
      font-size: 0.85rem;
      color: var(--yellow);
      margin-left: 0.5rem;
    }

    .tab-icon {
      margin-right: 0.5rem;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .content-panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .content-panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== BLUEPRINT ===== */
    .blueprint-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .bp-col {
      background: rgba(0, 229, 255, 0.05);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .bp-col h3 {
      color: var(--yellow);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 238, 0, 0.3);
      padding-bottom: 0.3rem;
    }

    .bp-col ul {
      list-style: none;
      margin-top: 1rem;
    }

    .bp-col li {
      margin-bottom: 0.6rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .bp-col li::before {
      content: '▹';
      color: var(--green);
      font-weight: bold;
    }

    .bp-col.trajectory {
      background: rgba(255, 238, 0, 0.05);
      border: 2px dashed var(--yellow);
    }

    .bp-col.trajectory li {
      color: var(--text);
      font-weight: 600;
    }

    .bp-col.trajectory li::before {
      content: '↓';
      color: var(--yellow);
    }

    .interview-guide-header {
      background: rgba(34, 255, 0, 0.1);
      border: 2px solid var(--green);
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
    }

    .interview-guide-header a {
      color: var(--yellow);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid var(--yellow);
    }

    .interview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 1.5rem;
    }

    .company-card {
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .company-card h4 {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      color: var(--blue);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .company-card ol {
      margin-left: 1.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .company-card li {
      margin-bottom: 0.5rem;
    }

    .company-card strong {
      color: var(--text);
    }

    /* ===== CONTEST CALENDAR ===== */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .month-card {
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .month-card h3 {
      color: var(--green);
      font-family: 'Orbitron', monospace;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .contest-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .contest-date {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
      color: var(--yellow);
      min-width: 120px;
    }

    .badge-platform {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-weight: 700;
      min-width: 90px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s, transform 0.15s;
    }

    .badge-platform:hover {
      opacity: 0.8;
      transform: scale(1.06);
    }

    .plt-lc {
      background: rgba(255, 161, 22, 0.2);
      color: #ffa116;
      border: 1px solid #ffa116;
    }

    .plt-cf {
      background: rgba(30, 144, 255, 0.2);
      color: #1e90ff;
      border: 1px solid #1e90ff;
    }

    .plt-cc {
      background: rgba(139, 69, 19, 0.2);
      color: #d2b48c;
      border: 1px solid #d2b48c;
    }

    /* ===== WEEK PANELS ===== */
    .week-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--card);
      border-radius: 16px;
      border-left: 6px solid var(--green);
    }

    .week-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      color: var(--green);
    }

    .week-subtitle {
      color: var(--text);
      font-size: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 0.5rem;
      font-weight: 500;
    }

    .day-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .day-card:hover {
      border-color: rgba(34, 255, 0, 0.4);
    }

    .day-card.completed {
      border-color: rgba(34, 255, 0, 0.8);
      background: rgba(34, 255, 0, 0.02);
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.2rem 1.5rem;
      cursor: pointer;
      user-select: none;
      background: var(--card2);
    }

    .day-header:hover {
      background: #1c2452;
    }

    .day-number {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      color: var(--green);
      min-width: 60px;
    }

    .day-info {
      flex: 1;
    }

    .day-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }

    .day-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 0.4rem;
      font-weight: 600;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .physical-date {
      color: var(--blue);
      background: rgba(0, 229, 255, 0.1);
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
    }

    .day-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 12px;
      border: 2px solid;
      font-weight: 700;
    }

    .day-progress {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      color: var(--yellow);
      font-weight: bold;
      min-width: 60px;
      text-align: right;
    }

    .day-chevron {
      color: var(--blue);
      font-size: 1.5rem;
      transition: transform 0.3s;
      margin-left: 1rem;
    }

    .day-card.open .day-chevron {
      transform: rotate(180deg);
    }

    .day-body {
      display: none;
      padding: 1.5rem;
      border-top: 2px solid var(--border);
    }

    .day-card.open .day-body {
      display: block;
    }

    .day-tip {
      background: rgba(0, 229, 255, 0.1);
      border: 2px solid rgba(0, 229, 255, 0.3);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #fff;
      font-weight: 500;
    }

    .day-tip strong {
      color: var(--blue);
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
    }

    /* ===== TASKS ===== */
    .section {
      margin-bottom: 2rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid var(--border);
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'IBM Plex Mono', monospace;
    }

    .section.morning .section-title {
      color: var(--yellow);
    }

    .section.afternoon .section-title {
      color: var(--orange);
    }

    .section.evening .section-title {
      color: var(--purple);
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      margin-bottom: 0.6rem;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid transparent;
      transition: all 0.2s;
      cursor: pointer;
    }

    .task-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border);
    }

    .task-item.done {
      background: rgba(34, 255, 0, 0.08);
      border-color: rgba(34, 255, 0, 0.3);
    }

    .task-cb {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 8px;
      border: 3px solid var(--muted);
      background: transparent;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      transition: all 0.2s;
      margin-top: 0.2rem;
      flex-shrink: 0;
    }

    .task-cb:checked {
      background: var(--green);
      border-color: var(--green);
    }

    .task-cb:checked::after {
      content: '✔';
      position: absolute;
      top: -2px;
      left: 5px;
      color: #000;
      font-size: 22px;
      font-weight: 900;
    }

    .task-label {
      font-size: 1.1rem;
      color: var(--text);
      line-height: 1.5;
      flex: 1;
      font-weight: 500;
      pointer-events: none;
    }

    .task-item.done .task-label {
      color: var(--muted);
      text-decoration: line-through;
    }

    .company-tag {
      display: inline-block;
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      margin-right: 0.5rem;
      background: #2a3052;
      border: 1px solid #3d4674;
      color: #fff;
    }

    .tag-deshaw {
      border-color: #ff2a55;
      color: #ff2a55;
    }

    .tag-atl {
      border-color: #0052CC;
      color: #0052CC;
    }

    .task-type {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 0.2rem 0.8rem;
      border-radius: 8px;
      white-space: nowrap;
      font-weight: 700;
      align-self: center;
      pointer-events: none;
    }

    .type-lc {
      background: rgba(0, 229, 255, 0.15);
      color: var(--blue);
      border: 2px solid var(--blue);
    }

    .type-study {
      background: rgba(255, 238, 0, 0.15);
      color: var(--yellow);
      border: 2px solid var(--yellow);
    }

    .type-core {
      background: rgba(224, 102, 255, 0.15);
      color: var(--purple);
      border: 2px solid var(--purple);
    }

    .type-mock {
      background: rgba(255, 42, 85, 0.15);
      color: var(--red);
      border: 2px solid var(--red);
    }

    .type-sql {
      background: rgba(34, 255, 0, 0.15);
      color: var(--green);
      border: 2px solid var(--green);
    }

    .type-lld {
      background: rgba(255, 145, 0, 0.15);
      color: var(--orange);
      border: 2px solid var(--orange);
    }

    @media (max-width: 800px) {
      html {
        font-size: 20px;
      }

      .header {
        padding: 1.5rem;
      }

      .tabs-container {
        padding: 0 1rem;
      }

      .main {
        padding: 1rem;
      }

      .day-header {
        flex-wrap: wrap;
      }
    }

    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--blue);
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-top">
      <div>
        <h1>⚡ TIER-1 PLACEMENT &amp; MBB TRAJECTORY PLANNER</h1>
        <p>// 61 Days | Github Company-Wise Integration | LocalStorage Enabled</p>
      </div>
    </div>
    <div class="overall-progress">
      <div class="progress-label">
        <span>GLOBAL PROGRESS</span>
        <span id="overall-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="overall-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-pill">Tasks: <span id="stat-done">0</span> / <span id="stat-total">0</span></div>
      <div class="stat-pill">Days Conquered: <span id="stat-days">0</span> / 61</div>
      <button onclick="exportProgress()" class="stat-pill btn-action"
        style="background:var(--blue); color:#000; border:none;">📤 Backup State</button>
      <button onclick="importProgress()" class="stat-pill btn-action"
        style="background:var(--orange); color:#000; border:none;">📥 Sync State</button>
    </div>
  </div>

  <div class="tabs-container">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="main" id="main-content"></div>

  <script>
    // =====================================================================
    // DATE HELPER (Starts May 26, 2026)
    // =====================================================================
    function getPhysicalDate(dayNumber) {
      const date = new Date(2026, 4, 26); // Month is 0-indexed; 4 = May
      date.setDate(date.getDate() + (dayNumber - 1));
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
    }

    // =====================================================================
    // CURRICULUM DATA
    // =====================================================================
    const DATA = [
      {
        week: 1, title: "Arrays &amp; Strings", sub: "Core Fundamentals &amp; Sliding Windows",
        days: [
          {
            d: 1, title: "Array Basics &amp; Two Pointers", tip: "Most SDE roles heavily index on Two Pointers for initial phone screens.", badge: "🟡 Medium",
            m: [{ t: "Study: Array iterators, time complexity, and in-place swapping.", type: "study" }, { t: "Study: Two Pointer technique (opposite ends vs same direction).", type: "study" }],
            a: [{ t: "<span class='company-tag'>Swiggy</span> LC 11: Container With Most Water", type: "lc" }, { t: "<span class='company-tag'>PhonePe</span> LC 121: Best Time to Buy/Sell Stock", type: "lc" }, { t: "<span class='company-tag'>MakeMyTrip</span> LC 26: Remove Duplicates from Sorted Array", type: "lc" }],
            e: [{ t: "CS Core: Java Memory Model for Arrays vs Objects", type: "core" }]
          },
          {
            d: 2, title: "Prefix Sum &amp; Subarrays", tip: "Prefix sums are the backbone of analytical OA questions (ZS, Deloitte).", badge: "🟡 Medium",
            m: [{ t: "Study: Prefix Sum Array logic and continuous sub-array equations.", type: "study" }, { t: "Study: Kadane's Algorithm for Maximum Subarray.", type: "study" }],

            e: [{ t: "CS Core: Difference between pass-by-value and pass-by-reference in Java.", type: "core" }]
          },
          {
            d: 3, title: "String Manipulation Basics", tip: "String parsing is essential for Sprinklr and Media.net.", badge: "🟡 Medium",
            m: [{ t: "Study: ASCII character arrays, StringBuilder, and string immutability.", type: "study" }, { t: "Study: Sliding window concept intro for substrings.", type: "study" }],
            a: [{ t: "<span class='company-tag'>Tekion</span> LC 3: Longest Substring Without Repeating", type: "lc" }, { t: "<span class='company-tag tag-atl'>Atlassian</span> LC 242: Valid Anagram", type: "lc" }, { t: "<span class='company-tag'>Sprinklr</span> LC 49: Group Anagrams", type: "lc" }],
            e: [{ t: "Write out the exact time complexities for Java String operations.", type: "study" }]
          },
          {
            d: 4, title: "Sliding Window Advanced", tip: "Frequent pattern in Atlassian and Swiggy OAs.", badge: "🔴 Hard",
            m: [{ t: "Study: Variable size sliding window template (expand right, shrink left).", type: "study" }, { t: "Study: 'At most K' trick for exact count problems.", type: "study" }],
            a: [{ t: "<span class='company-tag tag-atl'>Atlassian</span> LC 76: Minimum Window Substring", type: "lc" }, { t: "<span class='company-tag'>PhonePe</span> LC 424: Longest Repeating Character Replacement", type: "lc" }, { t: "<span class='company-tag'>Swiggy</span> LC 438: Find All Anagrams in a String", type: "lc" }],
            e: [{ t: "Draw a trace of the left/right pointers for LC 76 on paper.", type: "study" }]
          },
          {

    const STORAGE_KEY = 'praneel_placement_v4_tracker';
    let userState = {};

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) userState = JSON.parse(raw);
      } catch (e) { console.error("LocalStorage read error", e); }
    }

    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(userState)); } catch (e) { console.error("LocalStorage write error", e); }
    }

    function renderUI() {
      const tabsEl = document.getElementById('tabs');
      const mainEl = document.getElementById('main-content');

      function makeTab(id, label, isActive) {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (isActive ? ' active' : '');
        btn.id = 'tab-btn-' + id;
        btn.innerHTML = label;
        btn.addEventListener('click', () => switchTab(id));
        tabsEl.appendChild(btn);
      }

      makeTab('blueprint', '<span class="tab-icon">🎯</span> Strategic Blueprint', true);
      makeTab('contests', '<span class="tab-icon">🏆</span> Contest Radar', false);

      mainEl.insertAdjacentHTML('beforeend', BLUEPRINT_HTML);
      mainEl.insertAdjacentHTML('beforeend', CONTESTS_HTML);

      DATA.forEach((weekData, wIndex) => {
        makeTab('w' + wIndex,
          `WEEK ${weekData.week} <span class="tab-progress" id="tab-prog-${wIndex}">0%</span>`,
          false);

        const panel = document.createElement('div');
        panel.className = 'content-panel';
        panel.id = 'panel-w' + wIndex;

        let html = `
      <div class="week-header">
        <div style="flex:1;">
          <div class="week-title">WEEK ${weekData.week}: ${weekData.title}</div>
          <div class="week-subtitle">${weekData.sub}</div>
        </div>
      </div>`;

        weekData.days.forEach(day => {
          const total = (day.m?.length || 0) + (day.a?.length || 0) + (day.e?.length || 0);
          html += `
        <div class="day-card" id="card-${day.d}">
          <div class="day-header" onclick="toggleDay(${day.d})">
            <div class="day-number">D${day.d}</div>
            <div class="day-info">
              <div class="day-title">${day.title}</div>
              <div class="day-meta">
                <span class="physical-date">${getPhysicalDate(day.d)}</span>
                <span>${total} Tasks</span>
              </div>
            </div>
            <div class="day-badge" style="border-color:var(--border);color:var(--text);">${day.badge || ''}</div>
            <div class="day-progress" id="day-prog-${day.d}">0%</div>
            <div class="day-chevron">▼</div>
          </div>
          <div class="day-body" id="body-${day.d}">
            ${day.tip ? `<div class="day-tip"><strong>💡 STRATEGY:</strong> ${day.tip}</div>` : ''}
            ${renderSection(day.m, '☀️ MORNING', day.d, 'm')}
            ${renderSection(day.a, '⚡ AFTERNOON', day.d, 'a')}
            ${renderSection(day.e, '🌙 EVENING', day.d, 'e')}
          </div>
        </div>`;
        });

        panel.innerHTML = html;
        mainEl.appendChild(panel);
      });
    }

    function renderSection(items, title, dayId, sec) {
      if (!items || !items.length) return '';
      const cls = sec === 'm' ? 'morning' : sec === 'a' ? 'afternoon' : 'evening';
      let html = `<div class="section ${cls}"><div class="section-header"><div class="section-title">${title}</div></div>`;
      items.forEach((task, i) => {
        const tid = `d${dayId}_${sec}_${i}`;
        const checked = userState[tid] ? 'checked' : '';
        const done = userState[tid] ? 'done' : '';
        html += `
      <div class="task-item ${done}" id="item-${tid}" onclick="toggleTask('${tid}')">
        <input type="checkbox" class="task-cb" id="cb-${tid}" ${checked}
               onclick="event.stopPropagation(); toggleTask('${tid}')">
        <span class="task-label">${task.t}</span>
        <span class="task-type type-${task.type.toLowerCase()}">${task.type.toUpperCase()}</span>
      </div>`;
      });
      return html + '</div>';
    }

    // =====================================================================
    // INTERACTIONS
    // =====================================================================
    function toggleDay(dayId) {
      document.getElementById('card-' + dayId).classList.toggle('open');
    }

    function toggleTask(taskId) {
      userState[taskId] = !userState[taskId];
      saveState();

      const cb = document.getElementById('cb-' + taskId);
      const item = document.getElementById('item-' + taskId);
      if (cb) cb.checked = userState[taskId];
      if (item) {
        if (userState[taskId]) item.classList.add('done');
        else item.classList.remove('done');
      }
      updateProgress();
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-btn-' + tabId).classList.add('active');
      document.getElementById('panel-' + tabId).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateProgress() {
      let globalDone = 0, globalTotal = 0, daysCompleted = 0;

      DATA.forEach((weekData, wIndex) => {
        let weekDone = 0, weekTotal = 0;

        weekData.days.forEach(day => {
          let dayDone = 0, dayTotal = 0;
          [['m', day.m], ['a', day.a], ['e', day.e]].forEach(([sec, items]) => {
            if (!items) return;
            items.forEach((_, i) => {
              dayTotal++; weekTotal++; globalTotal++;
              if (userState[`d${day.d}_${sec}_${i}`]) { dayDone++; weekDone++; globalDone++; }
            });
          });

          const pct = dayTotal ? Math.round((dayDone / dayTotal) * 100) : 0;
          const progEl = document.getElementById('day-prog-' + day.d);
          const cardEl = document.getElementById('card-' + day.d);
          if (progEl) progEl.innerText = pct + '%';
          if (cardEl) {
            if (pct === 100 && dayTotal > 0) { cardEl.classList.add('completed'); daysCompleted++; }
            else cardEl.classList.remove('completed');
          }
        });

        const wPct = weekTotal ? Math.round((weekDone / weekTotal) * 100) : 0;
        const tabProg = document.getElementById('tab-prog-' + wIndex);
        if (tabProg) tabProg.innerText = wPct + '%';
      });

      const gPct = globalTotal ? Math.round((globalDone / globalTotal) * 100) : 0;
      document.getElementById('overall-pct').innerText = gPct + '%';
      document.getElementById('overall-bar').style.width = gPct + '%';
      document.getElementById('stat-done').innerText = globalDone;
      document.getElementById('stat-total').innerText = globalTotal;
      document.getElementById('stat-days').innerText = daysCompleted;
    }

    // =====================================================================
    // DATA PORTABILITY
    // =====================================================================
    window.exportProgress = function () {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw || raw === '{}') { alert('No progress to export yet!'); return; }
      const b64 = btoa(raw);
      navigator.clipboard.writeText(b64)
        .then(() => alert('🚀 Progress copied to clipboard! Paste this on your other device.'))
        .catch(() => prompt('Copy this progress code manually:', b64));
    };

    window.importProgress = function () {
      const code = prompt('Paste your backup progress code here:');
      if (!code) return;
      try {
        const decoded = atob(code.trim());
        JSON.parse(decoded);
        localStorage.setItem(STORAGE_KEY, decoded);
        alert('⚡ Progress synced successfully!');
        window.location.reload();
      } catch (e) {
        alert('❌ Invalid sync code. Please try again.');
      }
    };

    // =====================================================================
    // BOOT
    // =====================================================================
    window.addEventListener('DOMContentLoaded', () => {
      loadState();
      renderUI();
      updateProgress();
    });
  </script>
</body>

</html>
