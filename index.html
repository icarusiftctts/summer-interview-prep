<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Battle Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050714;
  --card: #0d1128;
  --card2: #151b3d;
  --border: #232d66;
  --green: #22ff00;
  --orange: #ff9100;
  --blue: #00e5ff;
  --purple: #e066ff;
  --yellow: #ffee00;
  --red: #ff2a55;
  --text: #ffffff;
  --muted: #aeb8d1;
  --fs-base: 15px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: var(--fs-base); }
body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.6; min-height: 100vh; }

/* ===== HEADER ===== */
.header { background: linear-gradient(135deg, #0a0d2b 0%, #151b3d 100%); border-bottom: 3px solid var(--green); padding: 2rem; position: relative; z-index: 100; box-shadow: 0 10px 40px rgba(34, 255, 0, 0.15); }
.header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
.header h1 { font-family: 'Orbitron', monospace; font-size: 1.8rem; color: var(--green); text-shadow: 0 0 15px rgba(34,255,0,0.4); text-transform: uppercase; }
.header p { color: var(--blue); font-size: 0.9rem; font-family: 'IBM Plex Mono', monospace; font-weight: 600; margin-top: 0.5rem; }

/* ===== PROGRESS BAR ===== */
.overall-progress { margin-top: 1.5rem; }
.progress-label { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 1rem; font-family: 'IBM Plex Mono', monospace; font-weight: 700;}
.progress-label span:first-child { color: var(--green); }
.progress-label span:last-child { color: var(--yellow); font-size: 1.2rem; }
.progress-bar-bg { background: #1a1f45; border-radius: 12px; height: 24px; overflow: hidden; border: 2px solid var(--border); }
.progress-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width 0.5s ease; }
.stats-row { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; align-items: center; }
.stat-pill { background: rgba(255,255,255,0.08); border: 2px solid var(--border); border-radius: 30px; padding: 0.5rem 1.2rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; color: var(--text); font-weight: 600; display:flex; align-items:center; gap:0.5rem;}
.stat-pill span { color: var(--green); font-weight: 700; font-size: 1.1rem; }
.btn-action { cursor: pointer; transition: transform 0.2s; }
.btn-action:hover { transform: scale(1.05); }
.auth-controls { display: flex; gap: 1rem; margin-left: auto; }

/* ===== TABS ===== */
.tabs-container { background: var(--card); border-bottom: 3px solid var(--border); padding: 0 2rem; overflow-x: auto; position: sticky; top: 0; z-index: 90;}
.tabs { display: flex; gap: 0.5rem; min-width: max-content; }
.tab-btn { background: none; border: none; cursor: pointer; padding: 1.2rem 1.5rem; font-size: 0.95rem; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: var(--muted); border-bottom: 4px solid transparent; transition: all 0.2s; }
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); background: rgba(34,255,0,0.1); }
.tab-progress { font-size: 0.85rem; color: var(--yellow); margin-left: 0.5rem; }
.tab-icon { margin-right: 0.5rem; }

/* ===== MAIN CONTENT ===== */
.main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
.content-panel { display: none; animation: fadeIn 0.3s ease; }
.content-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== BLUEPRINT ===== */
.blueprint-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; font-size: 0.85rem; margin-bottom: 2rem;}
.bp-col { background: rgba(0, 229, 255, 0.05); border: 2px solid var(--border); border-radius: 12px; padding: 1.5rem; }
.bp-col h3 { color: var(--yellow); font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; margin-bottom: 0.5rem; border-bottom: 1px solid rgba(255,238,0,0.3); padding-bottom: 0.3rem;}
.bp-col ul { list-style: none; margin-top: 1rem;}
.bp-col li { margin-bottom: 0.6rem; color: var(--muted); display: flex; align-items: center; gap: 0.5rem;}
.bp-col li::before { content: '▹'; color: var(--green); font-weight: bold; }
.bp-col.trajectory { background: rgba(255,238,0,0.05); border: 2px dashed var(--yellow); }
.bp-col.trajectory li { color: var(--text); font-weight: 600; }
.bp-col.trajectory li::before { content: '↓'; color: var(--yellow); }
.interview-guide-header { background: rgba(34, 255, 0, 0.1); border: 2px solid var(--green); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
.interview-guide-header a { color: var(--yellow); font-weight: 700; text-decoration: none; border-bottom: 1px solid var(--yellow); }
.interview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }
.company-card { background: var(--card2); border: 2px solid var(--border); border-radius: 12px; padding: 1.5rem; }
.company-card h4 { font-family: 'Orbitron', monospace; font-size: 1.2rem; color: var(--blue); margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;}
.company-card ol { margin-left: 1.5rem; color: var(--muted); font-size: 0.9rem; }
.company-card li { margin-bottom: 0.5rem; }
.company-card strong { color: var(--text); }

/* ===== CONTEST CALENDAR ===== */
.calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
.month-card { background: var(--card2); border: 2px solid var(--border); border-radius: 12px; padding: 1.5rem; }
.month-card h3 { color: var(--green); font-family: 'Orbitron', monospace; margin-bottom: 1rem; text-transform: uppercase;}
.contest-item { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem; font-size: 0.85rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: nowrap; }
.contest-date { font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: var(--yellow); min-width: 100px; flex-shrink: 0; font-size: 0.8rem; }
.badge-platform { font-size: 0.7rem; padding: 0.2rem 0.4rem; border-radius: 6px; font-weight: 700; width: 82px; min-width: 82px; text-align: center; text-decoration: none; display: inline-block; transition: opacity 0.2s, transform 0.15s; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge-platform:hover { opacity: 0.8; transform: scale(1.06); }
.plt-lc { background: rgba(255, 161, 22, 0.2); color: #ffa116; border: 1px solid #ffa116; }
.plt-cf { background: rgba(30, 144, 255, 0.2); color: #1e90ff; border: 1px solid #1e90ff; }
.plt-cc { background: rgba(139, 69, 19, 0.2); color: #d2b48c; border: 1px solid #d2b48c; }
.contest-item.done { background: rgba(34,255,0,0.06); border-radius: 8px; padding-left: 0.5rem; }
.contest-item.done .contest-label { color: var(--muted); text-decoration: line-through; }
.contest-cb { width: 20px; height: 20px; min-width: 20px; border-radius: 5px; border: 2px solid var(--muted); background: transparent; cursor: pointer; appearance: none; -webkit-appearance: none; position: relative; transition: all 0.2s; flex-shrink: 0; }
.contest-cb:checked { background: var(--green); border-color: var(--green); }
.contest-cb:checked::after { content: '✔'; position: absolute; top: -3px; left: 3px; color: #000; font-size: 13px; font-weight: 900; }
.contest-label { flex: 1; color: var(--text); font-size: 0.85rem; }
.contest-progress-bar-bg { background: #1a1f45; border-radius: 8px; height: 10px; overflow: hidden; border: 1px solid var(--border); margin-top: 1rem; }
.contest-progress-bar-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width 0.4s ease; }
.contest-progress-label { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; }

/* ===== WEEK PANELS ===== */
.week-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; padding: 1.5rem; background: var(--card); border-radius: 16px; border-left: 6px solid var(--green); }
.week-title { font-family: 'Orbitron', monospace; font-size: 1.5rem; color: var(--green); }
.week-subtitle { color: var(--text); font-size: 1rem; font-family: 'IBM Plex Mono', monospace; margin-top: 0.5rem; font-weight: 500;}
.day-card { background: var(--card); border: 2px solid var(--border); border-radius: 16px; margin-bottom: 1.5rem; overflow: hidden; transition: border-color 0.2s; }
.day-card:hover { border-color: rgba(34,255,0,0.4); }
.day-card.completed { border-color: rgba(34,255,0,0.8); background: rgba(34,255,0,0.02); }
.day-header { display: flex; align-items: center; gap: 1.5rem; padding: 1.2rem 1.5rem; cursor: pointer; user-select: none; background: var(--card2); }
.day-header:hover { background: #1c2452; }
.day-number { font-family: 'Orbitron', monospace; font-size: 1.6rem; color: var(--green); min-width: 60px; }
.day-info { flex: 1; }
.day-title { font-size: 1.3rem; font-weight: 700; color: var(--text); }
.day-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.95rem; color: var(--muted); margin-top: 0.4rem; font-weight: 600; display:flex; gap: 1rem; align-items:center;}
.physical-date { color: var(--blue); background: rgba(0,229,255,0.1); padding: 0.2rem 0.6rem; border-radius: 6px; }
.day-badge { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; padding: 0.4rem 0.8rem; border-radius: 12px; border: 2px solid; font-weight: 700;}
.day-progress { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; color: var(--yellow); font-weight: bold; min-width: 60px; text-align: right;}
.day-chevron { color: var(--blue); font-size: 1.5rem; transition: transform 0.3s; margin-left: 1rem;}
.day-card.open .day-chevron { transform: rotate(180deg); }
.day-body { display: none; padding: 1.5rem; border-top: 2px solid var(--border); }
.day-card.open .day-body { display: block; }
.day-tip { background: rgba(0, 229, 255, 0.1); border: 2px solid rgba(0, 229, 255, 0.3); border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; font-size: 1rem; color: #fff; font-weight: 500; }
.day-tip strong { color: var(--blue); font-family: 'Orbitron', monospace; letter-spacing: 1px; }

/* ===== TASKS ===== */
.section { margin-bottom: 2rem; }
.section-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 2px solid var(--border); }
.section-title { font-size: 1.2rem; font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
.section.morning .section-title { color: var(--yellow); }
.section.afternoon .section-title { color: var(--orange); }
.section.evening .section-title { color: var(--purple); }
.task-item { display: flex; align-items: flex-start; gap: 1rem; padding: 0.8rem 1rem; border-radius: 12px; margin-bottom: 0.6rem; background: rgba(255,255,255,0.03); border: 2px solid transparent; transition: all 0.2s; cursor: pointer; }
.task-item:hover { background: rgba(255,255,255,0.08); border-color: var(--border); }
.task-item.done { background: rgba(34,255,0,0.08); border-color: rgba(34,255,0,0.3); }
.task-cb { width: 32px; height: 32px; min-width: 32px; border-radius: 8px; border: 3px solid var(--muted); background: transparent; cursor: pointer; appearance: none; -webkit-appearance: none; position: relative; transition: all 0.2s; margin-top: 0.2rem; flex-shrink: 0; }
.task-cb:checked { background: var(--green); border-color: var(--green); }
.task-cb:checked::after { content: '✔'; position: absolute; top: -2px; left: 5px; color: #000; font-size: 22px; font-weight: 900; }
.task-label { font-size: 1rem; color: var(--text); line-height: 1.5; flex: 1; font-weight: 500; pointer-events: none; }
.task-item.done .task-label { color: var(--muted); text-decoration: line-through; }
.company-tag { display: inline-block; font-size: 0.75rem; font-family: 'IBM Plex Mono', monospace; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 6px; margin-right: 0.4rem; background: #2a3052; border: 1px solid #3d4674; color: #fff;}
.tag-deshaw { border-color: #ff2a55; color: #ff2a55; }
.tag-atl { border-color: #0052CC; color: #0052CC; }
.task-type { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; padding: 0.2rem 0.6rem; border-radius: 8px; white-space: nowrap; font-weight: 700; align-self: center; pointer-events: none;}
.type-lc { background: rgba(0, 229, 255, 0.15); color: var(--blue); border: 2px solid var(--blue); }
.type-study { background: rgba(255, 238, 0, 0.15); color: var(--yellow); border: 2px solid var(--yellow); }
.type-core { background: rgba(224, 102, 255, 0.15); color: var(--purple); border: 2px solid var(--purple); }
.type-mock { background: rgba(255, 42, 85, 0.15); color: var(--red); border: 2px solid var(--red); }
.type-sql { background: rgba(34, 255, 0, 0.15); color: var(--green); border: 2px solid var(--green); }
.type-lld { background: rgba(255, 145, 0, 0.15); color: var(--orange); border: 2px solid var(--orange); }

@media (max-width: 800px) {
  html { font-size: 20px; }
  .header { padding: 1.5rem; }
  .tabs-container { padding: 0 1rem; }
  .main { padding: 1rem; }
  .day-header { flex-wrap: wrap; }
  .auth-controls { margin-left: 0; width: 100%; margin-top: 1rem;}
}
::-webkit-scrollbar { width: 12px; height: 12px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: var(--blue); }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0Z48RrwPucIilUWCXhU_uJNPJFKJQqds",
    authDomain: "summer-planner-e3444.firebaseapp.com",
    projectId: "summer-planner-e3444",
    storageBucket: "summer-planner-e3444.firebasestorage.app",
    messagingSenderId: "589009739460",
    appId: "1:589009739460:web:2e257b2f89d657f2bc3391",
    measurementId: "G-Z8BP3G4VC3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // === SHARED ACCOUNT CONFIGURATION ===
  // PUT YOUR TWO EMAILS HERE
  const SHARED_EMAILS = ["praneeldev3@gmail.com", "devpraneel@gmail.com"];
  const SHARED_DOC_ID = "praneel_master_tracker";
  
  window.currentUid = null;
  window.currentUserEmail = null;

  // Helper function to route to the correct database document
  function getTargetDocId() {
    if (window.currentUserEmail && SHARED_EMAILS.includes(window.currentUserEmail)) {
      return SHARED_DOC_ID; // Both your emails load the exact same data
    }
    return window.currentUid; // Strangers get their own isolated data
  }

  window.login = async () => {
    try { await signInWithPopup(auth, provider); } 
    catch (error) { console.error("Login failed", error); }
  };
  
  window.logout = async () => {
    await signOut(auth);
    window.userState = {};
    try { localStorage.removeItem('praneel_placement_v4_tracker'); } catch(e) {}
    window.updateProgress();
    window.updateContestProgress();
    document.querySelectorAll('.task-cb, .contest-cb').forEach(cb => { cb.checked = false; });
    document.querySelectorAll('.task-item, .contest-item').forEach(el => el.classList.remove('done'));
  };

  onAuthStateChanged(auth, async (user) => {
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    
    if (user) {
      window.currentUid = user.uid;
      window.currentUserEmail = user.email; // Capture the email
      
      loginBtn.innerHTML = `Synced as ${user.email.split('@')[0]}`;
      loginBtn.style.background = "var(--green)";
      logoutBtn.style.display = "inline-flex";
      await fetchCloudState();
    } else {
      window.currentUid = null;
      window.currentUserEmail = null;
      loginBtn.innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="G" style="height: 14px; margin-right: 8px;">Login to Sync`;
      loginBtn.style.background = "#fff";
      logoutBtn.style.display = "none";
      window.loadState(); 
      window.updateProgress();
      window.updateContestProgress();
    }
  });

 async function fetchCloudState() {
    if (!window.currentUid) return;
    try {
      const docRef = doc(db, "users", getTargetDocId());
      const docSnap = await getDoc(docRef);

      if (docSnap.exists() && docSnap.data().progress) {
        window.userState = docSnap.data().progress;
        // Keep localStorage in sync with the authoritative cloud state
        try { localStorage.setItem('praneel_placement_v4_tracker', JSON.stringify(window.userState)); }
        catch(e) {}
      }
      // If doc doesn't exist, keep whatever loadState() already set — don't wipe it
    } catch(err) {
      console.error("Cloud fetch failed, using local state:", err);
    }

    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      const id = cb.id.replace('cb-', '').replace('ccb-', '');
      const isDone = !!window.userState[id];
      cb.checked = isDone;
      const item = cb.closest('.task-item, .contest-item');
      if (item) { isDone ? item.classList.add('done') : item.classList.remove('done'); }
    });

    window.updateProgress();
    window.updateContestProgress();
  }

  
  let _saveTimer = null;
window.saveState = function() {
  // Always keep localStorage in sync — provides instant state on refresh
  try { localStorage.setItem('praneel_placement_v4_tracker', JSON.stringify(window.userState)); }
  catch(e) { console.error("LocalStorage error", e); }

  if (!window.currentUid) return; // Not logged in — localStorage is enough

  // Debounced Firestore write (avoids spamming DB on rapid toggles)
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    setDoc(doc(db, "users", getTargetDocId()), {
      progress: window.userState,
      lastUpdated: new Date()
    }, { merge: true }).catch(err => console.error("Cloud Sync failed", err));
  }, 1200);
};
</script>

<script>
// =====================================================================
// DATE HELPER

  function buildHeaderSubtitle() {
  const deadline = new Date(2026, 6, 31);
  const today = new Date(); today.setHours(0,0,0,0); deadline.setHours(0,0,0,0);
  const daysLeft = Math.max(0, Math.ceil((deadline - today) / 86400000));
  const solvedCount = LC_PROBLEMS.filter(p => window.userState['lc_' + p[0]]).length;
  const remaining = LC_PROBLEMS.length - solvedCount;
  const pace = daysLeft > 0 ? (remaining / daysLeft).toFixed(1) : '—';

}
function getPhysicalDate(dayNumber) {
  const date = new Date(2026, 4, 26); // May 26, 2026
  date.setDate(date.getDate() + (dayNumber - 1));
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
}
  function getTodayDayNumber() {
  const start = new Date(2026, 4, 26);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  start.setHours(0, 0, 0, 0);
  const diff = Math.floor((today - start) / 86400000) + 1;
  return (diff >= 1 && diff <= 61) ? diff : null;
}

function toDateStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function toDisplayDate(d) { return `${MONTHS_SHORT[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')} (${WEEKDAYS[d.getDay()]})`; }
function toMonthShort(d) { return `${MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}`; }

async function fetchLiveContests() {
  const statusEl = document.getElementById('live-fetch-status');
  if (statusEl) { statusEl.innerText = '⟳ Fetching live data...'; statusEl.style.color = 'var(--yellow)'; }

  let fetched = [];
  for (const api of KONTESTS_APIS) {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 6000);
      const res = await fetch(api.url, { signal: controller.signal });
clearTimeout(timeoutId);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      data.forEach(c => {
        const start = new Date(c.start_time);
        if (isNaN(start)) return;
        fetched.push({ plt: api.plt, dateStr: toDateStr(start), date: toDisplayDate(start), label: c.name, url: c.url });
      });
    } catch(e) { console.warn('kontests fetch failed', e.message); }
  }  

  if (!fetched.length) {
    if (statusEl) { statusEl.innerText = '⚠ Live fetch failed — showing cached data'; statusEl.style.color = 'var(--red)'; }
    return;
  }

  const existingKeys = new Set();
  CONTESTS_DATA.forEach(month => { month.items.forEach(item => { existingKeys.add(`${item.plt}|${item.dateStr}`); }); });

  let added = 0;
  fetched.forEach(fc => {
    const key = `${fc.plt}|${fc.dateStr}`;
    if (existingKeys.has(key)) return; 
    existingKeys.add(key);

    const d = new Date(fc.dateStr + 'T12:00:00');
    const monthLabel = toMonthShort(d);
    let bucket = CONTESTS_DATA.find(m => m.month === monthLabel);
    if (!bucket) {
      bucket = { month: monthLabel, items: [] };
      CONTESTS_DATA.push(bucket);
      CONTESTS_DATA.sort((a, b) => new Date(a.items[0]?.dateStr || a.month) - new Date(b.items[0]?.dateStr || b.month));
    }
    bucket.items.push({ ...fc, live: true });
    bucket.items.sort((a, b) => a.dateStr.localeCompare(b.dateStr));
    added++;
  });

  const finalMsg = added > 0
    ? `✓ Live sync: +${added} new contests (${new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })})`
    : `✓ Up to date (${new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })})`;

  const mainEl = document.getElementById('main-content');
  const oldPanel = document.getElementById('panel-contests');
  const wasActive = oldPanel && oldPanel.classList.contains('active');

  // Re-insert BEFORE week panels to preserve DOM/tab order
  const weekPanel = document.getElementById('panel-w0');
  if (oldPanel) oldPanel.remove();
  if (weekPanel) {
    weekPanel.insertAdjacentHTML('beforebegin', buildContestsHTML());
  } else {
    mainEl.insertAdjacentHTML('beforeend', buildContestsHTML());
  }
  if (wasActive) document.getElementById('panel-contests').classList.add('active');

  // Now update the freshly created status element
  const newStatusEl = document.getElementById('live-fetch-status');
  if (newStatusEl) { newStatusEl.innerText = finalMsg; newStatusEl.style.color = 'var(--green)'; }

  window.updateContestProgress();
}

window.updateContestProgress = function() {
  let globalDone = 0, globalTotal = 0;
  CONTESTS_DATA.forEach((month, mi) => {
    let done = 0;
    month.items.forEach((_, ci) => {
      globalTotal++;
      if (window.userState[`contest_${mi}_${ci}`]) { done++; globalDone++; }
    });
    const pct  = month.items.length ? Math.round((done / month.items.length) * 100) : 0;
    const bar  = document.getElementById('cbar-'  + mi);
    const stat = document.getElementById('cstat-' + mi);
    const cpct = document.getElementById('cpct-'  + mi);
    if (bar)  bar.style.width  = pct + '%';
    if (stat) stat.innerText   = `${done}/${month.items.length} done`;
    if (cpct) cpct.innerText   = pct + '%';
  });
  const gPct = globalTotal ? Math.round((globalDone / globalTotal) * 100) : 0;
  const gBar      = document.getElementById('contest-global-bar');
  const gPctEl    = document.getElementById('contest-global-pct');
  const gCountEl  = document.getElementById('contest-count-label');
  const tabProg   = document.getElementById('tab-prog-contests');
  if (gBar)     gBar.style.width = gPct + '%';
  if (gPctEl)   gPctEl.innerText = gPct + '%';
  if (gCountEl) gCountEl.innerText = `${globalDone}/${globalTotal}`;
  if (tabProg)  tabProg.innerText  = gPct + '%';
}

function renderSection(items, title, dayId, sec) {
  if (!items || !items.length) return '';
  const cls = sec === 'm' ? 'morning' : sec === 'a' ? 'afternoon' : 'evening';
  let html = `<div class="section ${cls}"><div class="section-header"><div class="section-title">${title}</div></div>`;
  items.forEach((task, i) => {
    const tid = `d${dayId}_${sec}_${i}`;
    const checked = window.userState[tid] ? 'checked' : '';
    const done    = window.userState[tid] ? 'done'    : '';
    html += `
      <div class="task-item ${done}" id="item-${tid}" onclick="window.toggleTask('${tid}')">
        <input type="checkbox" class="task-cb" id="cb-${tid}" ${checked}
               onclick="event.stopPropagation(); window.toggleTask('${tid}')">
        <span class="task-label">${task.t}</span>
        <span class="task-type type-${task.type.toLowerCase()}">${task.type.toUpperCase()}</span>
      </div>`;
  });
  return html + '</div>';
}

function toggleDay(dayId) {
  document.getElementById('card-' + dayId).classList.toggle('open');

window.toggleTask = function(taskId) {
  window.userState[taskId] = !window.userState[taskId];
  if(window.saveState) window.saveState();

  const cb   = document.getElementById('cb-'   + taskId);
  const item = document.getElementById('item-' + taskId);
  if (cb)   cb.checked = window.userState[taskId];
  if (item) {
    if (window.userState[taskId]) item.classList.add('done');

  }
  window.updateProgress();
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-btn-' + tabId).classList.add('active');
  document.getElementById('panel-'   + tabId).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.updateProgress = function() {
  let globalDone = 0, globalTotal = 0, daysCompleted = 0;

  DATA.forEach((weekData, wIndex) => {
    let weekDone = 0, weekTotal = 0;

    weekData.days.forEach(day => {
      let dayDone = 0, dayTotal = 0;
      [['m', day.m], ['a', day.a], ['e', day.e]].forEach(([sec, items]) => {
        if (!items) return;
        items.forEach((_, i) => {
          dayTotal++; weekTotal++; globalTotal++;
          if (window.userState[`d${day.d}_${sec}_${i}`]) { dayDone++; weekDone++; globalDone++; }
        });
      });

      const pct = dayTotal ? Math.round((dayDone / dayTotal) * 100) : 0;
      const progEl = document.getElementById('day-prog-' + day.d);
      const cardEl = document.getElementById('card-'     + day.d);
      if (progEl) progEl.innerText = pct + '%';
      if (cardEl) {
        if (pct === 100 && dayTotal > 0) { cardEl.classList.add('completed'); daysCompleted++; }
        else                               cardEl.classList.remove('completed');
      }
    });

    const wPct = weekTotal ? Math.round((weekDone / weekTotal) * 100) : 0;
    const tabProg = document.getElementById('tab-prog-' + wIndex);
    if (tabProg) tabProg.innerText = wPct + '%';
  });

  const gPct = globalTotal ? Math.round((globalDone / globalTotal) * 100) : 0;
  document.getElementById('overall-pct').innerText  = gPct + '%';
  document.getElementById('overall-bar').style.width = gPct + '%';
  document.getElementById('stat-done').innerText    = globalDone;
  document.getElementById('stat-total').innerText   = globalTotal;
  document.getElementById('stat-days').innerText    = daysCompleted;
}

// BOOT
window.addEventListener('DOMContentLoaded', () => {
  window.loadState();
  renderUI();
  window.updateProgress();
  window.updateContestProgress();
  fetchLiveContests();

  // Auto-open and scroll to today's day card
  const todayDay = getTodayDayNumber();
  if (todayDay) {
    const card = document.getElementById('card-' + todayDay);
    if (card) {
      // Switch to the correct week tab first
      const weekIndex = DATA.findIndex(w => w.days.some(d => d.d === todayDay));
      if (weekIndex !== -1) switchTab('w' + weekIndex);
      card.classList.add('open');
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }
  }

  buildHeaderSubtitle();
});
</script>
</body>
